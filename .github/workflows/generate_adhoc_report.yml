name: SAFE — Generate Adhoc Report

on:
  # Triggers automatically when dbt transformations finish successfully.
  # Runs in parallel with generate_report.yml — both trigger on the same upstream.
  workflow_run:
    workflows: ["ECB SAFE — dbt Transformations"]
    types:
      - completed

  # Manual trigger from the Actions tab.
  workflow_dispatch:

jobs:
  adhoc:
    name: Generate and publish adhoc report
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    # For workflow_run triggers, skip if upstream failed.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pre-cache MotherDuck extension
        run: |
          DUCKDB_VERSION=$(python -c "import duckdb; print(duckdb.__version__)")
          EXT_DIR="$HOME/.duckdb/extensions/v${DUCKDB_VERSION}/linux_amd64"
          mkdir -p "$EXT_DIR"
          curl -fsSL \
            "https://extensions.duckdb.org/v${DUCKDB_VERSION}/linux_amd64/motherduck.duckdb_extension.gz" \
            | gunzip > "$EXT_DIR/motherduck.duckdb_extension"

      - name: Run adhoc report
        id: run_adhoc
        env:
          MOTHERDUCK_TOKEN:  ${{ secrets.MOTHERDUCK_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MISTRAL_API_KEY:   ${{ secrets.MISTRAL_API_KEY }}
        run: |
          python reports/run_adhoc_report.py
          # Check whether adhoc output was produced
          if [ -f reports/output/report_adhoc_latest.html ]; then
            echo "produced=true" >> "$GITHUB_OUTPUT"
          else
            echo "produced=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Quality check (adhoc spotlight)
        if: steps.run_adhoc.outputs.produced == 'true'
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: python reports/quality_check.py --html reports/output/report_adhoc_latest.html

      - name: Update adhoc run log
        if: steps.run_adhoc.outputs.produced == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/output/run_adhoc_log.json
          git diff --cached --quiet || git commit -m "chore: update adhoc run log [skip ci]"
          git push

      - name: Rename adhoc reports for Pages
        if: steps.run_adhoc.outputs.produced == 'true'
        run: |
          cp reports/output/report_adhoc_latest.html reports/output/adhoc.html
          cp reports/output/report_adhoc_latest_sk.html reports/output/adhoc-sk.html

      - name: Publish adhoc pages to GitHub Pages
        if: steps.run_adhoc.outputs.produced == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: reports/output
          publish_branch: gh-pages
          keep_files: true
