name: SAFE — Generate Report

on:
  # Triggers automatically when dbt transformations finish successfully.
  workflow_run:
    workflows: ["ECB SAFE — dbt Transformations"]
    types:
      - completed

  # Manual trigger from the Actions tab.
  workflow_dispatch:

jobs:
  report:
    name: Generate and publish report
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    # For workflow_run triggers, skip if upstream failed.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Need push access — use default GITHUB_TOKEN
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pre-cache MotherDuck extension
        run: |
          DUCKDB_VERSION=$(python -c "import duckdb; print(duckdb.__version__)")
          EXT_DIR="$HOME/.duckdb/extensions/v${DUCKDB_VERSION}/linux_amd64"
          mkdir -p "$EXT_DIR"
          curl -fsSL \
            "https://extensions.duckdb.org/v${DUCKDB_VERSION}/linux_amd64/motherduck.duckdb_extension.gz" \
            | gunzip > "$EXT_DIR/motherduck.duckdb_extension"

      - name: Run report
        env:
          MOTHERDUCK_TOKEN:  ${{ secrets.MOTHERDUCK_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MISTRAL_API_KEY:   ${{ secrets.MISTRAL_API_KEY }}
        run: python reports/run_report.py

      - name: Quality check (sign-off supervisor)
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: python reports/quality_check.py

      - name: Run gap analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MISTRAL_API_KEY:   ${{ secrets.MISTRAL_API_KEY }}
        run: python reports/gap_agent.py

      - name: Rename reports for Pages
        run: |
          mv reports/output/report_latest.html reports/output/index.html
          mv reports/output/report_latest_sk.html reports/output/sk.html

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: reports/output
          publish_branch: gh-pages
          keep_files: false
