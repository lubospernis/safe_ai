name: SAFE Agent — Slovakia Report

on:
  # Runs automatically after dbt transformations complete successfully
  workflow_run:
    workflows: ["ECB SAFE — dbt Transformations"]
    types:
      - completed

  # Manual trigger for testing or ad-hoc runs
  workflow_dispatch:

concurrency:
  group: safe-agent-report
  cancel-in-progress: false

jobs:
  generate-report:
    name: Generate and publish Slovakia report
    runs-on: ubuntu-latest

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: write   # needed to push docs/index.html

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so we can push back a commit cleanly
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Run SAFE Agent
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_RECIPIENTS: ${{ vars.REPORT_RECIPIENTS }}
          PAGES_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          HOME: /home/runner
        run: python safe_agent/safe_agent.py

      - name: Commit and push report to docs/
        run: |
          git config user.name "SAFE Agent"
          git config user.email "actions@github.com"
          git add docs/index.html
          if git diff --cached --quiet; then
            echo "No changes to report — skipping commit."
          else
            git commit -m "chore: update Slovakia SAFE report [skip ci]"
            git push origin HEAD:main
          fi
