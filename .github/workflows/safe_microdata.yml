name: ECB SAFE Microdata — dlt Ingestion

on:
  schedule:
    # Monthly fallback: 1st of every month at 06:00 UTC
    - cron: "0 6 1 * *"

    # ECB SAFE wave 39 release: 20 July 2025, 10:00 CEST = 08:00 UTC
    - cron: "0 8 20 7 *"    # 20 Jul 10:00 CEST
    - cron: "0 10 20 7 *"   # 20 Jul 12:00 CEST
    - cron: "0 14 20 7 *"   # 20 Jul 16:00 CEST
    - cron: "0 18 20 7 *"   # 20 Jul 20:00 CEST
    - cron: "0 6 21 7 *"    # 21 Jul 08:00 CEST (final catch-up)

    # ECB SAFE wave 40 release: ~20 October 2025, 10:00 CET = 09:00 UTC (CET = UTC+1)
    - cron: "0 9 20 10 *"   # 20 Oct 10:00 CET
    - cron: "0 11 20 10 *"  # 20 Oct 12:00 CET
    - cron: "0 15 20 10 *"  # 20 Oct 16:00 CET
    - cron: "0 19 20 10 *"  # 20 Oct 20:00 CET
    - cron: "0 7 21 10 *"   # 21 Oct 08:00 CET (final catch-up)

    # ECB SAFE wave 41 release: ~20 January 2026, 10:00 CET = 09:00 UTC (CET = UTC+1)
    - cron: "0 9 20 1 *"    # 20 Jan 10:00 CET
    - cron: "0 11 20 1 *"   # 20 Jan 12:00 CET
    - cron: "0 15 20 1 *"   # 20 Jan 16:00 CET
    - cron: "0 19 20 1 *"   # 20 Jan 20:00 CET
    - cron: "0 7 21 1 *"    # 21 Jan 08:00 CET (final catch-up)

    # ECB SAFE wave 42 release: ~20 April 2026, 10:00 CEST = 08:00 UTC (CEST = UTC+2)
    - cron: "0 8 20 4 *"    # 20 Apr 10:00 CEST
    - cron: "0 10 20 4 *"   # 20 Apr 12:00 CEST
    - cron: "0 14 20 4 *"   # 20 Apr 16:00 CEST
    - cron: "0 18 20 4 *"   # 20 Apr 20:00 CEST
    - cron: "0 6 21 4 *"    # 21 Apr 08:00 CEST (final catch-up)

  workflow_dispatch:       # manual trigger from the Actions tab

concurrency:
  group: safe-microdata-ingestion
  cancel-in-progress: false

jobs:
  ingest:
    name: Run dlt pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Run dlt pipeline
        env:
          # dlt maps DESTINATION__MOTHERDUCK__CREDENTIALS__PASSWORD
          # → destination.motherduck.credentials.password in secrets.toml
          DESTINATION__MOTHERDUCK__CREDENTIALS__PASSWORD: ${{ secrets.MOTHERDUCK_TOKEN }}
          # Required by MotherDuck's internal HTTPS component
          HOME: /home/runner
        run: python pipeline.py

      - name: Fetch and store ECB annex
        id: fetch_annex
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          HOME: /home/runner
        run: python fetch_annex.py

      - name: Open issue if annex fetch failed
        if: steps.fetch_annex.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[AUTO] ECB annex fetch failed — ${new Date().toISOString().slice(0,10)}`,
              body: [
                '## Annex fetch failed',
                '',
                'The ECB SAFE annex could not be downloaded or parsed.',
                '',
                `**URL**: \`https://www.ecb.europa.eu/stats/pdf/surveys/sme/Annex_3.en.xlsx\``,
                '',
                `**Workflow run**: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                '**What to check:**',
                '- Is the URL still valid? (ECB sometimes changes paths between waves)',
                '- Has the sheet name in the XLSX changed from "Questionnaire"?',
                '- Did the column structure change?',
                '',
                'If the URL changed, update `ANNEX_URL` in `fetch_annex.py` and close this issue.',
              ].join('\n'),
              labels: ['bug', 'data'],
            })

      - name: Fetch and store ECB SAFE release calendar
        id: fetch_release_calendar
        continue-on-error: true
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          HOME: /home/runner
        run: python reports/fetch_release_calendar.py

      - name: Open issue if release calendar fetch failed
        if: steps.fetch_release_calendar.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[AUTO] ECB release calendar fetch failed — ${new Date().toISOString().slice(0,10)}`,
              body: [
                '## Release calendar fetch failed',
                '',
                'The next ECB SAFE release date could not be scraped from the stats calendar.',
                '',
                `**URL**: \`https://www.ecb.europa.eu/press/calendars/statscal/html/index.en.html\``,
                '',
                `**Workflow run**: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                '**What to check:**',
                '- Is the URL still valid?',
                '- Has ECB changed the "Dataset: SAFE" label or the <dt>/<dd> page structure?',
                '',
                'This is non-blocking (continue-on-error) — the "next release" badge on the',
                'web app will just show stale data until this is fixed.',
                '',
                'If the page structure changed, update `reports/fetch_release_calendar.py`.',
              ].join('\n'),
              labels: ['bug', 'data'],
            })
