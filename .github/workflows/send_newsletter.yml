name: SAFE — Send Newsletter

on:
  # Triggers automatically when the standard report generation workflow finishes successfully
  workflow_run:
    workflows: ["SAFE — Generate Report"]
    types:
      - completed

  # Manual trigger — useful for resends or testing subscriber list changes
  workflow_dispatch:

jobs:
  send:
    name: Send newsletter digest
    runs-on: ubuntu-latest
    # Require manual approval via the newsletter-gate environment before sending.
    # GitHub emails the required reviewer automatically when a run is waiting.
    environment: newsletter-gate
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository (main branch — for the send script)
        uses: actions/checkout@v4

      - name: Checkout gh-pages for report HTML
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy report HTML into expected path
        # index.html is now the SK (default/primary) report, en.html is EN.
        run: |
          mkdir -p reports/output
          cp gh-pages/en.html reports/output/report_latest.html
          cp gh-pages/index.html reports/output/report_latest_sk.html

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send newsletter
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_16CHAR:  ${{ secrets.GMAIL_16CHAR }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: python reports/send_newsletter.py
