version: 2

models:

  - name: int_safe__q0b_pressingness
    description: >
      Long-format model for Q0B: "How pressing are the following problems for your firm?"
      (scale 1–10, where 1 = not pressing at all, 10 = extremely pressing).
      One row per firm (permid) × wave × problem category (7 categories).
      All problem categories and firm characteristics are decoded to human-readable labels.
      Non-responses (-1, -2, 99) are retained and flagged via is_nonresponse.

    config:
      tags: ["safe", "ecb", "survey", "intermediate", "q0b"]

    columns:
      - name: permid
        description: Unique anonymised enterprise identifier. Stable across all waves.
      - name: reference_period
        description: >
          Survey reference period for this response. '6m' = six-month questionnaire
          (source q0b_*); '3m' = three-month questionnaire (source q0b_*_g1, renamed
          q0b_*_3m in staging). The 3m variant is only populated in wave 30 (2024H1)
          and wave 37 (2025Q4).
      - name: wave_number
        description: Survey wave (1–37). 1 = 2009H1, 37 = 2025Q4.
      - name: problem_id
        description: >
          Problem category code (1–7).
          1=Finding customers, 2=Competition, 3=Access to finance,
          4=Costs of production or labour,
          5=Availability of skilled staff or experienced managers,
          6=Regulation, 7=Other.
      - name: problem_label
        description: Human-readable label for the problem category (decoded from problem_id).
      - name: pressingness_score
        description: >
          How pressing the problem is on a scale 1 (not pressing at all) to 10
          (extremely pressing). Non-response codes: -1 = not applicable,
          -2 = don't know, 99 = not asked.
      - name: is_nonresponse
        description: True when pressingness_score is a non-response code (-1, -2, 99).
      - name: q0b_open
        description: >
          Free-text specification for problem_id = 7 (Other). NULL for all other categories.
          Interviewers classify responses into: 11=taxes, 12=cash flow/liquidity,
          13=bureaucracy, 14=exchange rate fluctuations,
          15=political instability/economic crisis, 17=coronavirus,
          18=war in Ukraine, 19=rising inflation.
      - name: country_code
        description: ISO 3166-1 alpha-2 country code of the respondent enterprise.
      - name: country_name_en
        description: Full English country name.
      - name: employee_band_code
        description: "Firm size code: 1=micro (1–9), 2=small (10–49), 3=medium (50–249), 4=large (250+)."
      - name: firm_size_en
        description: Human-readable firm size label (micro / small / medium / large).
      - name: sector_code
        description: "NACE sector code: 2=construction, 4=trade, 5=transport, 12=industry, 13=other services."
      - name: sector_en
        description: Human-readable sector label.
      - name: survey_year
        description: Calendar year of the survey wave.
      - name: survey_period
        description: "Survey half-year or quarter (e.g. H1, H2, Q1, Q2, Q3, Q4)."
      - name: survey_period_label
        description: "Human-readable period label (e.g. '2024 Q3')."
      - name: weight_common
        description: >
          Main ECB calibration weight. Use for all standard weighted analysis.
          NULL for firms where the weight was not assigned.

  - name: int_safe__core_questions_long
    description: >
      Selected core survey questions unpivoted into long format (one row per firm × wave ×
      question sub-item). Enriched with firm context from int_safe__firm_survey_responses.
      Covers questions: q2 (business situation), q4rec (financing sources), q5 (change in
      financing need), q6a (purpose of financing), q7a/q7b (loan applications/outcomes),
      q9 (availability), q10 (bank loan terms), q11 (availability factors), q23 (expected
      availability), q26 (expected turnover/investment), q31 (inflation expectations),
      q32 (bank loan irrelevance reason), q33 (inflation risk direction), q34 (expected
      price/wage changes). Non-responses are retained and flagged via is_nonresponse.
      Includes all firm sizes — apply employee_band_code filter in downstream models.

    config:
      tags: ["safe", "ecb", "survey", "intermediate", "long"]

    columns:
      - name: permid
        description: Unique anonymised enterprise identifier.
      - name: wave_number
        description: Survey wave number (1–37).
      - name: country_code
        description: ISO 3166-1 alpha-2 country code.
      - name: country_name_en
        description: Full English country name.
      - name: employee_band_code
        description: "Firm size code: 1=micro (1–9), 2=small (10–49), 3=medium (50–249), 4=large (250+)."
      - name: firm_size_en
        description: Human-readable firm size label.
      - name: is_sme
        description: True when employee_band_code is 1, 2, or 3 (excludes large firms).
      - name: sector_code
        description: "NACE sector code: 2=construction, 4=trade, 5=transport, 12=industry, 13=other services."
      - name: sector_en
        description: Human-readable sector label.
      - name: survey_year
        description: Calendar year of the survey wave.
      - name: survey_period
        description: "Survey half-year or quarter (H1, H2, Q1–Q4)."
      - name: survey_period_label
        description: "Human-readable period label (e.g. '2024Q3')."
      - name: weight_common
        description: Main ECB calibration weight for weighted analysis.
      - name: question_id
        description: >
          Question identifier. Values: q2, q4rec, q5, q6a, q7a, q7b, q9, q10, q11, q23,
          q26, q31, q32, q33, q34.
      - name: sub_item
        description: Sub-item code within the question (e.g. 'a', 'b', '1', '2').
      - name: response_raw
        description: Raw response code as in the source data.
      - name: response_rec
        description: Recoded response (where a _rec variant exists in staging).
      - name: response_3m
        description: >
          3-month reference period response (from the _g1 questionnaire variant).
          Populated only in quarterly waves (wave 30 / 2024H1 onwards) where the
          3-month questionnaire was administered alongside the 6-month one.
          NULL for all other waves and for questions without a _g1 variant.
      - name: response_3m_rec
        description: >
          Recoded version of response_3m (from the _g1_rec raw column).
          Populated only where a recoded 3-month variant exists in the source data.
      - name: is_nonresponse
        description: >
          True when the response is a non-response code. Standard codes: -1 (not applicable),
          -2 (don't know), -99 (refused), 7 (not asked/routing), 99 (not asked).
          Exceptions: q4rec uses codes 9 and 99 only (code 7 = "not relevant" is substantive).
          q31 and q34 (continuous numeric) use -9999 as the DK/refused sentinel.
