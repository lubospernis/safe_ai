version: 2

models:

  - name: mart_safe__slovakia_kpis
    description: >
      One row per survey wave for Slovakia SMEs only (country_code = 'SK',
      employee_band_code 1–3).  All series choices have been made by a human
      analyst — the AI agent MUST read KPI values from this table rather than
      recomputing from raw mart tables.

      Financing conditions (source: mart_safe__financing_conditions, ECB methodology,
        all firms, 3m reference period preferred where available):
        q5a_need_nb     = Q5 sub_item='a' net balance (need for bank loans).
                          Positive means net increase in need.
        q9a_avail_nb    = Q9 sub_item='a' net balance (availability of bank loans).
                          Positive means availability improved.
        bank_loan_gap   = q5a_need_nb − q9a_avail_nb.
                          Positive = credit crunch signal.  Negative = conditions easing.
        q10a_interest_nb= Q10 sub_item='a' (interest rate level).
                          Positive = banks raised rates (tightening).
                          Negative = banks cut rates (easing).

      Business situation (source: mart_safe__business_situation, sub_items):
        a=Turnover, b=Labour costs, e=Profit, g=Investment, i=Employees.
        Net balance = % increased − % decreased.  Positive = improving.
        WARNING: labour_cost_nb positive means costs RISING (bad for firms).

      Pressing problems (source: mart_safe__q0b_pressingness, 6m preferred):
        Weighted average pressingness score, scale 1–10.
        Higher value = more pressing.  Seven fixed categories.

      Loan access (source: mart_safe__loan_applications, sub_item='a'=bank loan):
        All rates are percentages (0–100) of valid respondents.
        bank_loan_access_gap = discouragement_rate + rejection share of all respondents
          (ECB headline financing-gap indicator; higher = worse access).

      Outlook (source: mart_safe__outlook):
        Expected change in turnover and investment over next two quarters.
        Net balance = % expecting increase − % expecting decrease.

    config:
      tags: ["safe", "ecb", "survey", "mart", "slovakia", "kpis"]

    columns:
      - name: wave_number
        description: Survey wave number. Uniquely identifies one row.
        tests:
          - not_null
          - unique

      - name: survey_period_label
        description: "Human-readable period label (e.g. '2026Q1')."
        tests:
          - not_null

      # ── Financing conditions ──────────────────────────────────────────
      - name: q5a_need_nb
        description: >
          Net balance: change in need for bank loans (Q5 sub_item='a').
          Unit: percentage points (pp). Range: −100 to +100.
          Positive = net increase in need.  Negative = net decrease.
        meta:
          unit: pp
          scale: net_balance
          source_question: Q5a
          positive_means: "firms' need for bank loans increased on net"
          negative_means: "firms' need for bank loans decreased on net"

      - name: q9a_avail_nb
        description: >
          Net balance: availability of bank loans (Q9 sub_item='a').
          Unit: pp. Range: −100 to +100.
          Positive = availability improved.  Negative = availability deteriorated.
        meta:
          unit: pp
          scale: net_balance
          source_question: Q9a
          positive_means: "bank loan availability improved on net"
          negative_means: "bank loan availability deteriorated on net"

      - name: bank_loan_gap
        description: >
          Financing conditions gap for bank loans = q5a_need_nb − q9a_avail_nb.
          Unit: pp.
          Positive = needs rising faster than supply (credit crunch signal).
          Negative = supply easing relative to demand (conditions loosening).
          This is NOT the ECB loan-access financing gap (that is bank_loan_access_gap).
        meta:
          unit: pp
          scale: net_balance_difference
          positive_means: "credit crunch signal — needs outpacing supply"
          negative_means: "conditions easing — supply keeping up with demand"

      - name: q10a_interest_nb
        description: >
          Net balance: level of interest rates on bank loans (Q10 sub_item='a').
          Unit: pp. Range: −100 to +100.
          Positive = banks raised rates on net (monetary tightening passing through).
          Negative = banks cut rates on net (easing passing through).
        meta:
          unit: pp
          scale: net_balance
          source_question: Q10a
          positive_means: "banks raised interest rates on net (tightening)"
          negative_means: "banks cut interest rates on net (easing)"

      # ── Business situation ────────────────────────────────────────────
      - name: turnover_nb
        description: >
          Net balance: turnover change (Q2 sub_item='a').
          Unit: pp. Positive = more firms report rising turnover than falling.
        meta:
          unit: pp
          scale: net_balance
          source_question: Q2a
          positive_means: "turnover rising on net"

      - name: profit_nb
        description: >
          Net balance: profit change (Q2 sub_item='e').
          Unit: pp. Positive = more firms report rising profit than falling.
        meta:
          unit: pp
          scale: net_balance
          source_question: Q2e
          positive_means: "profits rising on net"

      - name: labour_cost_nb
        description: >
          Net balance: labour cost change (Q2 sub_item='b').
          Unit: pp. CAUTION: positive here means costs are RISING — bad for firms.
        meta:
          unit: pp
          scale: net_balance
          source_question: Q2b
          positive_means: "labour costs rising on net (cost pressure building)"
          negative_means: "labour costs falling on net (cost relief)"

      - name: employees_nb
        description: >
          Net balance: number of employees change (Q2 sub_item='i').
          Unit: pp. Positive = net hiring. Negative = net shedding.
        meta:
          unit: pp
          scale: net_balance
          source_question: Q2i
          positive_means: "net hiring"
          negative_means: "net layoffs"

      - name: investment_nb
        description: >
          Net balance: investment in property/plant change (Q2 sub_item='g').
          Unit: pp. Positive = net investment increase.
        meta:
          unit: pp
          scale: net_balance
          source_question: Q2g
          positive_means: "investment rising on net"

      # ── Pressing problems ─────────────────────────────────────────────
      - name: press_finding_customers
        description: >
          Weighted average pressingness of 'Finding customers' (problem_id=1).
          Scale 1–10. 1 = not pressing at all. 10 = extremely pressing.
          Prefers 6m reference period; falls back to 3m where unavailable.
        meta:
          unit: score_1_to_10
          scale: pressingness
          problem_id: 1
          positive_means: "more pressing"

      - name: press_competition
        description: >
          Weighted average pressingness of 'Competition' (problem_id=2). Scale 1–10.
        meta:
          unit: score_1_to_10
          scale: pressingness
          problem_id: 2

      - name: press_access_to_finance
        description: >
          Weighted average pressingness of 'Access to finance' (problem_id=3). Scale 1–10.
        meta:
          unit: score_1_to_10
          scale: pressingness
          problem_id: 3

      - name: press_costs
        description: >
          Weighted average pressingness of 'Costs of production or labour' (problem_id=4). Scale 1–10.
        meta:
          unit: score_1_to_10
          scale: pressingness
          problem_id: 4

      - name: press_skilled_staff
        description: >
          Weighted average pressingness of 'Availability of skilled staff or experienced managers'
          (problem_id=5). Scale 1–10.
        meta:
          unit: score_1_to_10
          scale: pressingness
          problem_id: 5

      - name: press_regulation
        description: >
          Weighted average pressingness of 'Regulation' (problem_id=6). Scale 1–10.
        meta:
          unit: score_1_to_10
          scale: pressingness
          problem_id: 6

      - name: press_other
        description: >
          Weighted average pressingness of 'Other' (problem_id=7). Scale 1–10.
        meta:
          unit: score_1_to_10
          scale: pressingness
          problem_id: 7

      # ── Loan access ───────────────────────────────────────────────────
      - name: bank_loan_app_rate
        description: >
          % of valid respondents that applied for a bank loan (Q7A=1, sub_item='a').
          Unit: %. Range: 0–100.
        meta:
          unit: percent
          scale: rate_0_100
          source_question: Q7A_a

      - name: bank_loan_disc_rate
        description: >
          % of valid respondents discouraged from applying (Q7A=2, sub_item='a').
          Fear-of-rejection measure. Unit: %. Range: 0–100.
        meta:
          unit: percent
          scale: rate_0_100
          source_question: Q7A_a

      - name: bank_loan_rej_rate
        description: >
          % of bank loan applicants that were rejected by lender (Q7B=4, sub_item='a').
          Note: denominator is applicants, not all respondents.
          Unit: %. Range: 0–100.
        meta:
          unit: percent
          scale: rate_0_100
          source_question: Q7B_a
          denominator: applicants_only

      - name: bank_loan_access_gap
        description: >
          ECB financing-gap indicator for bank loans = % discouraged + % of all respondents
          who applied and were rejected (both as % of all valid Q7A respondents).
          Higher = worse access.  Unit: %. Range: 0–100.
          This is the ECB headline access-to-finance indicator, NOT the conditions gap.
        meta:
          unit: percent
          scale: rate_0_100
          positive_means: "worse access to bank loans"

      # ── Outlook ───────────────────────────────────────────────────────
      - name: turnover_outlook_nb
        description: >
          Net balance: expected turnover change over next two quarters (Q26 sub_item='a').
          Unit: pp. Range: −100 to +100.
          Positive = more firms expect growth than contraction.
        meta:
          unit: pp
          scale: net_balance
          source_question: Q26a
          positive_means: "net expectation of turnover growth"

      - name: investment_outlook_nb
        description: >
          Net balance: expected investment change over next two quarters (Q26 sub_item='b').
          Unit: pp. Range: −100 to +100.
        meta:
          unit: pp
          scale: net_balance
          source_question: Q26b
          positive_means: "net expectation of investment growth"

  - name: mart_safe__q0b_pressingness
    description: >
      Weighted aggregated pressingness scores for Q0B by country × wave × problem × reference_period.
      Source: ECB SAFE survey Q0B ("How pressing are the following problems for your firm?"
      on a scale 1–10, where 1 = not pressing at all, 10 = extremely pressing).
      Non-responses (-1, -2, 99) excluded from aggregations.
      Scope: SMEs only (employee_band_code 1–3: micro, small, medium — excludes large firms).
      DEDUPLICATION NOTE: from wave 30 (2024H1) onward, some waves have BOTH a '6m' and a '3m'
      row per problem.  When analysing a single wave's ranking, use reference_period = '6m'
      and fall back to '3m' only where '6m' is absent.  Use mart_safe__slovakia_kpis for
      pre-deduplicated values.
      CAUTION for AI agents: avg_pressingness_wtd is a score on the 1–10 scale — it is NOT
      a net balance or a percentage.  Do not compute differences between waves as if it were
      a net balance.

    config:
      tags: ["safe", "ecb", "survey", "mart", "q0b"]

    columns:
      - name: country_code
        description: ISO 3166-1 alpha-2 country code of the respondent enterprise.
        tests:
          - not_null
      - name: country_name_en
        description: Full English country name.
      - name: wave_number
        description: Survey wave (1–37). 1 = 2009H1, 37 = 2025Q4.
      - name: survey_year
        description: Calendar year of the survey wave.
      - name: survey_period
        description: "Survey half-year or quarter (e.g. H1, H2, Q1, Q2, Q3, Q4)."
      - name: survey_period_label
        description: "Human-readable period label (e.g. '2024 Q3')."
      - name: reference_period
        description: >
          Survey reference period. '6m' = six-month questionnaire; '3m' = three-month
          questionnaire (only in wave 30 / 2024H1 and wave 37 / 2025Q4).
      - name: problem_id
        description: >
          Problem category code (1–7).
          1=Finding customers, 2=Competition, 3=Access to finance,
          4=Costs of production or labour,
          5=Availability of skilled staff or experienced managers,
          6=Regulation, 7=Other.
      - name: problem_label
        description: >
          Human-readable label for the problem category.
          Values: Finding customers | Competition | Access to finance |
          Costs of production or labour | Availability of skilled staff or experienced managers |
          Regulation | Other.
      - name: employee_band_code
        description: "Firm size code: 1=micro (1–9 employees), 2=small (10–49), 3=medium (50–249), 4=large (250+)."
      - name: firm_size_en
        description: Human-readable firm size label (micro / small / medium / large).
      - name: n_respondents
        description: Count of firms that provided a valid (non-missing) response to this problem category.
      - name: n_nonresponse
        description: Count of non-responses (-1, -2, 99) excluded from the aggregations.
      - name: total_weight
        description: Sum of weight_common across all valid respondents in this group.
      - name: avg_pressingness_wtd
        description: >
          Weighted average pressingness score (1–10 scale), using weight_common.
          Higher = more pressing. Rounded to 2 decimal places.
          This is a score, NOT a net balance or percentage.
        meta:
          unit: score_1_to_10
          scale: pressingness
          positive_means: "problem is more pressing (higher = worse)"
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 1 and avg_pressingness_wtd <= 10"
              config:
                where: "avg_pressingness_wtd is not null"
      - name: avg_pressingness_unwtd
        description: >
          Unweighted average pressingness score (1–10 scale) for reference.
          Rounded to 2 decimal places.
      - name: pct_high_pressing
        description: >
          Percentage (0–100) of valid weighted responses with pressingness score >= 7.
          Represents firms rating the problem as highly pressing.
      - name: pct_low_pressing
        description: >
          Percentage (0–100) of valid weighted responses with pressingness score <= 3.
          Represents firms rating the problem as not very pressing.

  - name: mart_safe__business_situation
    description: >
      Weighted net balances for the business situation question (question_id = 'q2' in the data;
      corresponds to Q2 in the annex questionnaire).
      Question: "Have the following company indicators decreased, remained unchanged or increased
      during the past period?" Response: 1=Increased, 2=Unchanged, 3=Decreased.
      Net balance = % increased − % decreased (standard ECB published metric).
      Scope: SMEs only (employee_band_code 1–3: micro, small, medium — excludes large firms).
      Aggregation: wave × country × sub-item.
      Non-responses (-1, -2, -99, 7, 99) excluded from metrics but counted in n_nonresponse.

    config:
      tags: ["safe", "ecb", "survey", "mart", "business_situation"]

    columns:
      - name: country_code
        description: ISO 3166-1 alpha-2 country code.
      - name: country_name_en
        description: Full English country name.
      - name: wave_number
        description: Survey wave (1–37).
      - name: survey_year
        description: Calendar year of the survey wave.
      - name: survey_period
        description: "Survey half-year or quarter (H1, H2, Q1–Q4)."
      - name: survey_period_label
        description: "Human-readable period label (e.g. '2024Q3')."
      - name: sub_item
        description: "Sub-item code: a=Turnover, b=Labour costs, c=Interest expenses (net), d=Profit."
      - name: sub_item_label
        description: Human-readable label for the sub-item.
      - name: n_total
        description: Total rows (valid + non-response) in this group.
      - name: n_respondents
        description: Count of valid responses (non-response codes excluded).
      - name: n_nonresponse
        description: Count of non-responses (-1, -2, -99, 7, 99).
      - name: total_weight
        description: Sum of weight_common for valid respondents.
      - name: pct_increased_wtd
        description: Weighted % of firms reporting the indicator increased (0–100).
      - name: pct_unchanged_wtd
        description: Weighted % of firms reporting the indicator remained unchanged (0–100).
      - name: pct_decreased_wtd
        description: Weighted % of firms reporting the indicator decreased (0–100).
      - name: net_balance_wtd
        description: >
          Weighted net balance = pct_increased − pct_decreased. Range: −100 to +100.
          Positive = indicator rising on balance. For costs (labour, interest), positive means costs rising.
      - name: net_balance_unwtd
        description: Unweighted net balance for reference.

  - name: mart_safe__financing_conditions
    description: >
      ECB-methodology net balances for financing needs (Q5), availability (Q9), and bank loan
      terms (Q10). Follows ECB Table 1 methodology: all firms (no SME filter), reference periods
      6m and 3m kept separate (one row per wave × reference_period), codes 7 (N/A) and 9 (DK)
      excluded from denominator.

      Q5: change in need for external financing. Net balance positive = needs rising.
      Q9: availability of external financing. Net balance positive = availability improved.
      Q10: terms and conditions of bank financing. Net balance positive = tightening (adverse).
      financing_gap_wtd (Q9 rows only) = Q5.net_balance − Q9.net_balance.
        Positive = credit crunch signal. NULL for Q5 and Q10 rows.

      Reference period:
        reference_period = '6m': six-month questionnaire (ECB white panel).
        reference_period = '3m': three-month questionnaire (ECB grey panel).
        Waves 1–29: only '6m'. Waves 30+ may have both. For ECB Table 1 grey panel, use '3m'.

      Rounding: net_balance_wtd rounded to 1 dp. ECB publishes integers; ±1pp residual expected
      due to weight precision in the microdata file.

      Sub-items: Q5/Q9: a=bank loans, b=trade credit, c=equity, d=debt securities,
        f=credit line/overdraft, g=leasing, h=other loan.
        Q10: a=interest rates, b=non-interest costs, c=loan size, d=maturity,
        e=collateral, f=other terms.
      Aggregation: wave × country × question_id × sub_item × reference_period.

      CAUTION: do NOT re-derive financing_gap_wtd — read the pre-computed column.
        Do NOT present Q10 net_balance as a "financing availability" figure — positive = tightening.

    config:
      tags: ["safe", "ecb", "survey", "mart", "financing_conditions"]

    columns:
      - name: country_code
        description: ISO 3166-1 alpha-2 country code.
        tests:
          - not_null
      - name: country_name_en
        description: Full English country name.
      - name: wave_number
        description: Survey wave (1–37).
      - name: survey_year
        description: Calendar year of the survey wave.
      - name: survey_period
        description: "Survey half-year or quarter (H1, H2, Q1–Q4)."
      - name: survey_period_label
        description: "Human-readable period label (e.g. '2024Q3')."
      - name: question_id
        description: "'q5' = change in financing need; 'q9' = availability of external financing; 'q10' = terms and conditions of bank financing."
        tests:
          - not_null
          - accepted_values:
              values: ['q5', 'q9', 'q10']
      - name: question_label
        description: Human-readable label for the question.
      - name: sub_item
        description: >
          Sub-item code. Q5/Q9: a=bank loans, b=trade credit, c=equity, d=debt securities,
          f=credit line/overdraft, g=leasing, h=other loan (Q9 also has e=other financing).
          Q10: a=interest rates, b=non-interest costs, c=loan size, d=maturity,
          e=collateral, f=other terms.
      - name: sub_item_label
        description: Human-readable label for the sub-item (verified from annex.xlsx).
      - name: n_respondents
        description: Count of valid responses.
      - name: n_nonresponse
        description: Count of non-responses excluded.
      - name: total_weight
        description: Sum of weight_common for valid respondents.
      - name: pct_improved_wtd
        description: >
          Weighted % of code-1 responses (raw). Q5: need increased. Q9: availability improved.
          Q10: term increased by bank (e.g. interest rate rose).
      - name: pct_unchanged_wtd
        description: Weighted % reporting unchanged (code 2).
      - name: pct_deteriorated_wtd
        description: >
          Weighted % of code-3 responses (raw). Q5: need decreased. Q9: availability deteriorated.
          Q10: term decreased by bank.
      - name: net_balance_wtd
        description: >
          Weighted net balance = % code-1 − % code-3. Range: −100 to +100.
          Q5: positive = net increase in need. Q9: positive = net improvement in availability.
          Q10: positive = net tightening by bank (e.g. rates up, collateral up).
        meta:
          unit: pp
          range: "−100 to +100"
          q5_positive_means: "financing need increased on net"
          q9_positive_means: "financing availability improved on net"
          q10_positive_means: "bank tightened terms on net (ADVERSE for firms)"
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= -100 and net_balance_wtd <= 100"
              config:
                where: "net_balance_wtd is not null"
      - name: net_balance_unwtd
        description: Unweighted net balance for reference.
      - name: firm_size
        description: >
          Firm size cut for this row.
          'all'   = all firms regardless of size — use this to match ECB published figures.
          'sme'   = micro, small, medium firms (employee_band_code 1–3, up to 249 employees).
          'large' = large firms (employee_band_code 4, 250+ employees).
        tests:
          - accepted_values:
              values: ['all', 'sme', 'large']
      - name: financing_gap_wtd
        description: >
          Financing conditions gap = Q5.net_balance_wtd − Q9.net_balance_wtd for the same
          instrument, wave, reference_period, and firm_size.
          Populated ONLY for question_id = 'q9' rows; NULL for Q5 and Q10.
          Positive = needs rising faster than availability (credit crunch signal).
          Negative = availability easing relative to needs (conditions loosening).
          Do NOT confuse with bank_loan_access_gap in mart_safe__loan_applications, which
          is the ECB Q7 discouragement + rejection indicator.
        meta:
          unit: pp
          range: "−200 to +200 (theoretical)"
          null_when: "question_id in ('q5', 'q10')"
          positive_means: "credit crunch signal"
          negative_means: "conditions easing"

  - name: mart_safe__loan_applications
    description: >
      Loan application rates, discouragement, rejection, and financing gap by instrument.
      Source: Q7A (application status) and Q7B (outcome for applicants).
      Q7A: "Have you applied for the following types of financing?" (1=applied, 2=discouraged,
      3=sufficient funds, 4=other reason not to apply).
      Q7B: "If you applied, what was the outcome?" (1=received all, 3=too costly, 4=rejected,
      5=received most, 6=received limited part, 8=pending).
      Instruments: bank loans, trade credit, other external financing, credit lines.
      Financing gap = discouragement_rate + (rejection_rate × application_rate / 100).
      Scope: SMEs only (employee_band_code 1–3: micro, small, medium — excludes large firms).
      Aggregation: wave × country × instrument.

    config:
      tags: ["safe", "ecb", "survey", "mart", "loan_applications"]

    columns:
      - name: country_code
        description: ISO 3166-1 alpha-2 country code.
      - name: country_name_en
        description: Full English country name.
      - name: wave_number
        description: Survey wave (1–37).
      - name: survey_year
        description: Calendar year of the survey wave.
      - name: survey_period
        description: "Survey half-year or quarter (H1, H2, Q1–Q4)."
      - name: survey_period_label
        description: "Human-readable period label (e.g. '2024Q3')."
      - name: sub_item
        description: "Instrument code: a=bank loan, b=trade credit, c=other external, d=credit line/overdraft."
      - name: instrument_label
        description: Human-readable label for the financing instrument.
      - name: n_valid_q7a
        description: Count of firms with a valid Q7A response (denominator for rates).
      - name: n_applied
        description: Count of firms that applied (Q7A = 1).
      - name: n_discouraged
        description: Count of firms that did not apply due to fear of rejection (Q7A = 2).
      - name: n_rejected
        description: Count of applicants that were rejected (Q7B = 4).
      - name: total_weight
        description: Sum of weight_common for valid Q7A respondents.
      - name: application_rate_wtd
        description: "Weighted % of firms that applied. Range: 0–100."
      - name: discouragement_rate_wtd
        description: "Weighted % of firms discouraged from applying (Q7A = 2). Range: 0–100."
      - name: success_full_rate_wtd
        description: "Weighted % of applicants that received all or most of what they applied for. Range: 0–100."
      - name: success_partial_rate_wtd
        description: "Weighted % of applicants that received only a limited part. Range: 0–100."
      - name: rejection_rate_wtd
        description: "Weighted % of applicants that were rejected. Range: 0–100."
      - name: financing_gap_wtd
        description: >
          ECB financing gap indicator = discouragement_rate + rejection share of all respondents
          (% discouraged + % applied and rejected, both as share of all valid respondents).
          Range: 0–100. Higher = worse access to financing.

  - name: mart_safe__outlook
    description: >
      Weighted net balances for expected changes in turnover and fixed investment (Q26).
      Question: "Looking ahead, please indicate whether you think the following will increase,
      decrease or remain unchanged over the next two quarters."
      Response: 1=will increase, 2=will remain unchanged, 3=will decrease, 9=DK.
      Net balance = % will increase − % will decrease.
      Scope: SMEs only (employee_band_code 1–3: micro, small, medium — excludes large firms).
      Aggregation: wave × country × sub-item (a=turnover, b=fixed investment).
      Sub-item labels verified from annex.xlsx Q26.

    config:
      tags: ["safe", "ecb", "survey", "mart", "outlook"]

    columns:
      - name: country_code
        description: ISO 3166-1 alpha-2 country code.
      - name: country_name_en
        description: Full English country name.
      - name: wave_number
        description: Survey wave (1–37).
      - name: survey_year
        description: Calendar year of the survey wave.
      - name: survey_period
        description: "Survey half-year or quarter (H1, H2, Q1–Q4)."
      - name: survey_period_label
        description: "Human-readable period label (e.g. '2024Q3')."
      - name: sub_item
        description: "Sub-item code: a=Company's turnover, b=Investments in property, plant or equipment."
      - name: sub_item_label
        description: Human-readable label for the sub-item.
      - name: n_total
        description: Total rows in this group.
      - name: n_respondents
        description: Count of valid responses.
      - name: n_nonresponse
        description: Count of non-responses (code 9 = DK).
      - name: total_weight
        description: Sum of weight_common for valid respondents.
      - name: pct_increase_wtd
        description: Weighted % of firms expecting an increase. Range 0–100.
      - name: pct_unchanged_wtd
        description: Weighted % expecting no change. Range 0–100.
      - name: pct_decrease_wtd
        description: Weighted % expecting a decrease. Range 0–100.
      - name: net_balance_wtd
        description: >
          Weighted net balance = pct_increase − pct_decrease. Range −100 to +100.
          Positive = net expectation of growth.
      - name: net_balance_unwtd
        description: Unweighted net balance for reference.

  - name: mart_safe__expectations
    description: >
      Aggregated expectation statistics for Q31 (inflation rate expectations), Q33 (inflation
      risk direction), and Q34 (expected % changes in prices, wages, and employment).
      Q31 and Q34 are continuous numeric variables; statistics include weighted mean and
      unweighted percentiles (p25, median, p75).
      Q33 is an ordinal question; statistics include weighted % downside/balanced/upside
      and a net balance (upside − downside).
      Scope: SMEs only (employee_band_code 1–3: micro, small, medium — excludes large firms).
      Aggregation: wave × country × question_id × sub_item.

    config:
      tags: ["safe", "ecb", "survey", "mart", "expectations"]

    columns:
      - name: country_code
        description: ISO 3166-1 alpha-2 country code.
      - name: country_name_en
        description: Full English country name.
      - name: wave_number
        description: Survey wave (1–37).
      - name: survey_year
        description: Calendar year of the survey wave.
      - name: survey_period
        description: "Survey half-year or quarter (H1, H2, Q1–Q4)."
      - name: survey_period_label
        description: "Human-readable period label (e.g. '2024Q3')."
      - name: question_id
        description: "'q31' = inflation rate expectations; 'q33' = inflation risk direction; 'q34' = expected % changes."
      - name: question_label
        description: Human-readable question label.
      - name: sub_item
        description: >
          Sub-item code. Q31: a=in 12 months, b=in 3 years, c=in 5 years.
          Q33: '' (single response). Q34: a=selling price, b=input prices, c=wages, d=employment.
      - name: sub_item_label
        description: Human-readable label for the sub-item.
      - name: n_respondents
        description: Count of valid responses (non-response sentinel -9999 or code 9 excluded).
      - name: n_nonresponse
        description: Count of non-responses.
      - name: total_weight
        description: Sum of weight_common for valid respondents.
      - name: mean_wtd
        description: "Weighted mean response value (Q31, Q34 only). Null for Q33."
      - name: mean_unwtd
        description: "Unweighted mean for reference (Q31, Q34 only). Null for Q33."
      - name: p25_unwtd
        description: "Unweighted 25th percentile (Q31, Q34 only). Null for Q33."
      - name: median_unwtd
        description: "Unweighted median (Q31, Q34 only). Null for Q33."
      - name: p75_unwtd
        description: "Unweighted 75th percentile (Q31, Q34 only). Null for Q33."
      - name: pct_positive
        description: "% of valid responses with value > 0 (Q31, Q34 only). Null for Q33."
      - name: pct_zero
        description: "% of valid responses with value = 0 (Q31, Q34 only). Null for Q33."
      - name: pct_negative
        description: "% of valid responses with value < 0 (Q31, Q34 only). Null for Q33."
      - name: pct_downside_wtd
        description: "Weighted % reporting risk to the downside — code 1 (Q33 only). Null for Q31/Q34."
      - name: pct_balanced_wtd
        description: "Weighted % reporting broadly balanced risks — code 2 (Q33 only). Null for Q31/Q34."
      - name: pct_upside_wtd
        description: "Weighted % reporting risk to the upside — code 3 (Q33 only). Null for Q31/Q34."
      - name: net_balance_wtd
        description: "Weighted net balance = pct_upside − pct_downside (Q33 only). Null for Q31/Q34."

  - name: mart_safe__financing_purpose
    description: >
      Weighted share of firms citing each financing purpose (Q6A).
      Q6A is a multi-select question — firms can tick multiple purposes simultaneously.
      Each purpose is a binary item: 1=Yes (cited), 2=No, 99/null=DK/NA (excluded).

      Purposes (purpose_id):
        1 = Fixed investment
        2 = Inventory and working capital
        3 = Hiring and training of employees
        4 = Developing and launching new products or services
        5 = Refinancing or paying off obligations
        6 = Other

      Metric: pct_cited_wtd = weighted % of valid respondents (codes 1 or 2) who cited
      the purpose (code=1). Denominator excludes null and 99 (DK/NA).

      Note: prior to 2017H2, firms not using any financing had all items null.
      From 2017H2 onward, 99 is assigned per item. Both are excluded from denominator.

      Scope: all firms (no SME filter).
      Reference periods kept separate: reference_period='6m' (waves 1+) or '3m' (waves 30+).
      Aggregation: wave × country × purpose_id × reference_period.

    config:
      tags: ["safe", "ecb", "survey", "mart", "q6a", "financing_purpose"]

    columns:
      - name: country_code
        description: ISO 3166-1 alpha-2 country code.
        tests:
          - not_null
      - name: country_name_en
        description: Full English country name.
      - name: wave_number
        description: Survey wave number (1=2009H1, 38=2026Q1).
      - name: survey_year
        description: Calendar year of the wave.
      - name: survey_period
        description: "Survey period code (H1, H2, Q1–Q4)."
      - name: survey_period_label
        description: "Human-readable period label e.g. '2026Q1'."
      - name: purpose_id
        description: >
          Integer 1–6 identifying the financing purpose.
          1=Fixed investment, 2=Inventory and working capital,
          3=Hiring and training of employees,
          4=Developing and launching new products or services,
          5=Refinancing or paying off obligations, 6=Other.
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3, 4, 5, 6]
      - name: purpose_label
        description: Human-readable label for the financing purpose (verified from annex.xlsx).
        tests:
          - not_null
      - name: reference_period
        description: >
          '6m' = six-month questionnaire. '3m' = three-month questionnaire (waves 30+ only).
          Waves 1–29 have only '6m'. Use '3m' for ECB grey-panel comparisons.
      - name: n_respondents
        description: Count of firms giving a valid response to this item (codes 1 or 2).
      - name: n_nonresponse
        description: Count of firms with code 99 (DK/NA) excluded from denominator.
      - name: pct_cited_wtd
        description: >
          Weighted % of valid respondents who cited this purpose (code=1).
          Range: 0–100. Multiple purposes can add up to more than 100% across rows
          for the same wave/country because this is multi-select.
        meta:
          unit: pct
          positive_means: "more firms used financing for this purpose"
      - name: pct_cited_unwtd
        description: Unweighted % citing this purpose, for reference.
      - name: firm_size
        description: >
          Firm size cut for this row.
          'all'   = all firms regardless of size — use this to match ECB published aggregates.
          'sme'   = micro, small, medium firms (employee_band_code 1–3, up to 249 employees).
          'large' = large firms (employee_band_code 4, 250+ employees).

  - name: mart_safe__q11_factors
    description: >
      Net balances for Q11 — self-assessed factors affecting the availability of external
      financing. Question: "For each of the following factors, would you say that they have
      improved, remained unchanged or deteriorated over the past period?"
      Response codes: 1=Improved, 2=Remained unchanged, 3=Deteriorated, 7=N/A, 9=DK.
      Codes 7 and 9 excluded from denominator.
      Net balance = % improved − % deteriorated (weighted by weight_common).
      Positive = factor improving (FAVOURABLE for financing access).
      Negative = factor deteriorating (ADVERSE — potential credit supply constraint).

      Key sub-items for credit supply analysis:
        f = Willingness of banks to provide credit  — direct bank supply signal
        a = General economic outlook (insofar as it affects financing availability)
        b = Access to public financial support, including guarantees
        e = Enterprise's credit history                — demand-side creditworthiness
        c = Enterprise-specific outlook (sales/profitability)
        d = Enterprise's own capital

      Scope: all firms ('all') and SMEs only ('sme'). Waves 30+ (2024Q1 onward).
      Aggregation: wave × country × sub_item × firm_size.

    config:
      tags: ["safe", "ecb", "survey", "mart", "q11", "credit_supply"]

    columns:
      - name: country_code
        description: ISO 3166-1 alpha-2 country code.
        tests:
          - not_null
      - name: country_name_en
        description: Full English country name.
      - name: wave_number
        description: Survey wave (30 = 2024Q1 onward).
      - name: survey_year
        description: Calendar year of the survey wave.
      - name: survey_period
        description: "Survey quarter (Q1–Q4)."
      - name: survey_period_label
        description: "Human-readable period label (e.g. '2026Q1')."
      - name: sub_item
        description: >
          Factor code: a=General economic outlook, b=Access to public support/guarantees,
          c=Enterprise-specific outlook (sales/profitability), d=Enterprise's own capital,
          e=Enterprise's credit history, f=Willingness of banks to provide credit,
          g=Willingness of business partners (trade credit), h=Willingness of investors,
          i=Willingness to extend credit to customers (wave 29+).
      - name: sub_item_label
        description: Human-readable label for the factor.
      - name: firm_size
        description: "'all' = all firms; 'sme' = micro/small/medium (bands 1–3)."
        tests:
          - accepted_values:
              values: ['all', 'sme']
      - name: n_respondents
        description: Count of valid responses (codes 7 and 9 excluded).
      - name: n_nonresponse
        description: Count of non-responses (codes 7=N/A and 9=DK) excluded from metrics.
      - name: pct_improved_wtd
        description: Weighted % reporting the factor improved (code 1). Range 0–100.
      - name: pct_unchanged_wtd
        description: Weighted % reporting the factor unchanged (code 2). Range 0–100.
      - name: pct_deteriorated_wtd
        description: Weighted % reporting the factor deteriorated (code 3). Range 0–100.
      - name: net_balance_wtd
        description: >
          Weighted net balance = pct_improved − pct_deteriorated. Range −100 to +100.
          Positive = factor improving on net (favourable for access to financing).
          Negative = factor deteriorating on net (adverse — potential credit supply constraint).
          For sub_item='f' (bank willingness): negative is the key credit supply warning signal.
        meta:
          unit: pp
          range: "−100 to +100"
          positive_means: "factor improving (favourable for financing access)"
          negative_means: "factor deteriorating (adverse, potential credit supply constraint)"
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= -100 and net_balance_wtd <= 100"
              config:
                where: "net_balance_wtd is not null"

  - name: mart_safe__survey_participants
    description: >
      Firm-level participation counts by wave × country × firm_size.
      Three-month reference period only (wave 30 / 2024Q1 onward).

      Includes an 'EA' pseudo-country row aggregating all euro-area countries.
      Use this table to understand sample sizes and SME/large composition before
      interpreting net balances from other marts.

      firm_size values: 'all', 'sme' (bands 1–3), 'large' (band 4).
      pct_sme and pct_large are only meaningful on firm_size = 'all' rows.
    columns:
      - name: wave_number
        description: Survey wave number (30 = 2024Q1).
      - name: country_code
        description: ISO 2-letter country code, or 'EA' for the euro-area aggregate.
      - name: country_name_en
        description: Country name in English, or 'Euro Area'.
      - name: firm_size
        description: "'all', 'sme' (bands 1–3), or 'large' (band 4)."
      - name: n_firms
        description: Unweighted headcount of survey respondents in this wave/country/size.
      - name: n_firms_wtd
        description: Sum of weight_common — ECB-weighted effective count.
      - name: pct_sme
        description: >
          Share of SMEs among all respondents (%). Meaningful on firm_size = 'all' rows only;
          100 on 'sme' rows, 0 on 'large' rows.
      - name: pct_large
        description: >
          Share of large firms among all respondents (%). Complement of pct_sme on
          firm_size = 'all' rows.

  - name: mart_safe__question_coverage
    description: >
      Response coverage for every question × sub-item by wave × country × firm_size.
      Three-month reference period only (wave 30 / 2024Q1 onward).

      Covers all questions in int_safe__core_questions_long (Q2, Q5, Q6A, Q7A, Q7B,
      Q9, Q10, Q11, Q23, Q26, Q31, Q33, Q34, Q4rec) plus Q0B.

      Includes an 'EA' pseudo-country row aggregating all euro-area countries.

      Use this table to understand how many firms answered a given question before
      quoting a net balance — especially for routed questions (Q5/Q9/Q10) where
      n_total << total survey respondents because only relevant-instrument firms are asked.

      firm_size values: 'all', 'sme' (bands 1–3), 'large' (band 4).
    columns:
      - name: wave_number
        description: Survey wave number (30 = 2024Q1).
      - name: country_code
        description: ISO 2-letter country code, or 'EA' for the euro-area aggregate.
      - name: question_id
        description: Question identifier (e.g. 'q5', 'q9', 'q0b').
      - name: sub_item
        description: Sub-item code within the question (e.g. 'a' for bank loans).
      - name: firm_size
        description: "'all', 'sme' (bands 1–3), or 'large' (band 4)."
      - name: n_total
        description: Firms for whom the question was asked (response_3m is not null).
      - name: n_valid
        description: Firms giving a codeable answer (DK/NA/not-applicable excluded).
      - name: n_nonresponse
        description: Firms answering DK, NA, or not applicable.
      - name: response_rate_wtd
        description: >
          Weighted response rate: n_valid / n_total as a % using weight_common.
          Range 0–100.
      - name: response_rate_unwtd
        description: Unweighted response rate for reference. Range 0–100.
